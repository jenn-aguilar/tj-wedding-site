<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex,nofollow" />
    <meta name="theme-color" content="#F5EFE6" />

    <!-- SEO (title/description mirrored at runtime from config.seo — see src/App.jsx) -->
    <title>Tam & Jenn — 28 March 2027 | Da Nang, Vietnam</title>
    <meta name="description" content="Join us to celebrate the wedding of Tam & Jenn in beautiful Da Nang, Vietnam." />

    <!--
      Social share preview (Messenger, Instagram, WhatsApp, iMessage, Facebook, etc).
      These apps fetch this raw HTML and never run the site's JavaScript, so these
      tags MUST be hardcoded here — keep them in sync with config.seo by hand.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Tam & Jenn — 28 March 2027 | Da Nang, Vietnam" />
    <meta property="og:description" content="Join us to celebrate the wedding of Tam & Jenn in beautiful Da Nang, Vietnam." />
    <meta property="og:image" content="https://tamandjenn.info/images/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tam & Jenn — 28 March 2027 | Da Nang, Vietnam" />
    <meta name="twitter:description" content="Join us to celebrate the wedding of Tam & Jenn in beautiful Da Nang, Vietnam." />
    <meta name="twitter:image" content="https://tamandjenn.info/images/og-image.jpg" />

    <!-- Google Fonts are loaded at runtime from config.theme.fonts via useTheme(). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
